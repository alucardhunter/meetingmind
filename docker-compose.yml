version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: meetingmind-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: meetingmind
      POSTGRES_PASSWORD: meetingmind_dev
      POSTGRES_DB: meetingmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetingmind"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: meetingmind-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    environment:
      DATABASE_URL: postgresql://meetingmind:meetingmind_dev@db:5432/meetingmind
      NODE_ENV: development
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: meetingmind-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: pnpm dev

volumes:
  postgres_data:
